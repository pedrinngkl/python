{% extends 'layout.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
    <h1>Dashboard</h1>
    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <div style="padding: 20px; border: 1px solid #ccc; border-radius: 8px; flex: 1; text-align: center;">
            <h3>Total de Filmes</h3>
            <p style="font-size: 32px; font-weight: bold; margin: 10px 0;">{{ total_filmes }}</p>
        </div>
        <div style="padding: 20px; border: 1px solid #ccc; border-radius: 8px; flex: 1; text-align: center;">
            <h3>Total de Salas</h3>
            <p style="font-size: 32px; font-weight: bold; margin: 10px 0;">{{ total_salas }}</p>
        </div>
        <div style="padding: 20px; border: 1px solid #ccc; border-radius: 8px; flex: 1; text-align: center;">
            <h3>Total de Sessões</h3>
            <p style="font-size: 32px; font-weight: bold; margin: 10px 0;">{{ total_sessoes }}</p>
        </div>
        <div style="padding: 20px; border: 1px solid #ccc; border-radius: 8px; flex: 1; text-align: center;">
            <h3>Total de Ingressos</h3>
            <p style="font-size: 32px; font-weight: bold; margin: 10px 0;">{{ total_ingressos }}</p>
        </div>
    </div>
{% endblock %}
