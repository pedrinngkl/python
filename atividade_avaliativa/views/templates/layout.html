<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Cinema{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        nav { background: #eee; padding: 10px; margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #333; }
        .form-grupo { margin-bottom: 15px; }
        .form-grupo label { display: block; margin-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f4f4f4; }
        .btn { display: inline-block; padding: 10px 15px; background: #007BFF; color: #fff; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>

    <nav>
        <a href="{{ url_for('cinema.index') }}">Cinema</a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
